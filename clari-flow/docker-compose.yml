version: "3.8"

services:
  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: clariflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - clariflow-net

  # ── ClariFlow Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clariflow-app
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - h2-data:/app/data
    restart: unless-stopped
    networks:
      - clariflow-net

volumes:
  redis-data:
  h2-data:

networks:
  clariflow-net:
    driver: bridge
