<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClariFlow — 登录</title>
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .card { background:#fff; border-radius:12px; padding:40px; width:400px; box-shadow:0 2px 12px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom:24px; color:#1a73e8; text-align:center; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:0.85rem; color:#666; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px 14px; border:1px solid #d0d0d0; border-radius:6px; font-size:0.95rem; }
        .btn { width:100%; padding:12px; background:#1a73e8; color:#fff; border:none; border-radius:6px; font-size:1rem; cursor:pointer; margin-top:8px; }
        .btn:hover { background:#1557b0; }
        .toggle { text-align:center; margin-top:16px; color:#888; font-size:0.85rem; }
        .toggle a { color:#1a73e8; cursor:pointer; text-decoration:none; }
        .error { color:#c62828; font-size:0.85rem; margin-top:8px; display:none; }
        .demo { margin-top:20px; padding:12px; background:#f5f7fa; border-radius:6px; font-size:0.8rem; color:#888; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="formTitle">登录 ClariFlow</h2>
    <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <div class="form-group" id="emailGroup" style="display:none;">
        <label>邮箱（可选）</label>
        <input type="email" id="email" placeholder="请输入邮箱">
    </div>
    <div class="error" id="errorMsg"></div>
    <button class="btn" id="submitBtn" onclick="submitForm()">登 录</button>
    <div class="toggle">
        <span id="toggleText">没有账号？</span>
        <a id="toggleLink" onclick="toggleMode()">立即注册</a>
    </div>
    <div class="demo">
        💡 演示账号：admin / 123456 &nbsp;|&nbsp; pm / 123456
    </div>
</div>

<script>
let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('formTitle').textContent = isLogin ? '登录 ClariFlow' : '注册 ClariFlow';
    document.getElementById('submitBtn').textContent = isLogin ? '登 录' : '注 册';
    document.getElementById('toggleText').textContent = isLogin ? '没有账号？' : '已有账号？';
    document.getElementById('toggleLink').textContent = isLogin ? '立即注册' : '立即登录';
    document.getElementById('emailGroup').style.display = isLogin ? 'none' : 'block';
    document.getElementById('errorMsg').style.display = 'none';
}

async function submitForm() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const email = document.getElementById('email').value.trim();
    const err = document.getElementById('errorMsg');

    if (!username || !password) {
        err.textContent = '用户名和密码不能为空';
        err.style.display = 'block';
        return;
    }

    const body = isLogin ? { username, password } : { username, password, email };
    const url = isLogin ? '/api/auth/login' : '/api/auth/register';

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const json = await res.json();
        if (json.code !== 0) {
            err.textContent = json.message || '操作失败';
            err.style.display = 'block';
            return;
        }
        // 存储 token 并跳转
        localStorage.setItem('token', json.data.token);
        localStorage.setItem('username', json.data.username);
        window.location.href = '/index.html';
    } catch (e) {
        err.textContent = '网络错误: ' + e.message;
        err.style.display = 'block';
    }
}
</script>

</body>
</html>
